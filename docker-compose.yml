services:
  db:
    image: mysql:8.0
    container_name: yumi-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-yumi}
      MYSQL_USER: ${MYSQL_USER:-yumi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-yumipass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  backend:
    build: ./backend
    container_name: yumi-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-yumi}:${MYSQL_PASSWORD:-yumipass}@db:3306/${MYSQL_DATABASE:-yumi}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-please-use-a-long-random-string}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: yumi-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  db_data:
  backend_uploads:
