server {
    listen 80;
    server_name _;

    # Saída do build do Vite
    root   /usr/share/nginx/html;
    index  index.html;

    # Logo/uploads podem ser maiores que o padrão de 1MB do nginx
    client_max_body_size 10m;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # API e uploads vão para o backend (mesma origem -> sem CORS no browser).
    # "backend" é o nome do serviço no docker-compose.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Assets com hash no nome podem ser cacheados agressivamente
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Fallback do SPA — o React Router cuida das rotas no cliente
    location / {
        try_files $uri $uri/ /index.html;
    }
}
